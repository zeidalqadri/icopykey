name: Build macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_dmg:
        description: "Create .dmg installer"
        type: boolean
        default: true

jobs:
  build:
    runs-on: macos-13
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps
        run: |
          brew install hidapi

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt5 numpy hidapi pycryptodome requests rich

      - name: Build CLI (pip package)
        run: |
          pip install -e .

      - name: Build .app bundle
        run: |
          pyinstaller --clean --noconfirm packaging/icopykey.spec

      - name: Create .dmg installer
        if: ${{ github.event.inputs.create_dmg != 'false' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_NAME="icopykey-${VERSION}-macos.dmg"
          ln -sf /Applications dist/Applications
          hdiutil create -volname "icopykey" -srcfolder dist \
            -ov -format UDZO "dist/${DMG_NAME}"
          rm -f dist/Applications
          echo "DMG=${DMG_NAME}" >> $GITHUB_ENV

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: icopykey-macos-app
          path: dist/icopykey.app
          compression-level: 0

      - name: Upload .dmg installer
        if: ${{ env.DMG != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: icopykey-macos-dmg
          path: dist/${{ env.DMG }}

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/icopykey*.dmg
